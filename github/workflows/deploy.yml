name: Monorepo Deployment to Cloudflare

on:
  push:
    branches:
      - ["**"]
      
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.4'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # --- PROJECT 1: adminside ---
      - name: Build & Deploy adminside
        id: deploy_adminside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing adminside..."
          cd adminside
          npm install --legacy-peer-deps
          npm run build
          npx wrangler pages deploy dist --project-name=adminside-external > ../admin_deploy.txt 2>&1
          cat ../admin_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.pages\.dev" ../admin_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- PROJECT 2: userside ---
      - name: Build & Deploy userside
        id: deploy_userside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing userside..."
          cd userside
          npm install --legacy-peer-deps
          npm run build
          DEPLOY_ENV=$([[ "${GITHUB_REF}" == "refs/heads/main" ]] && echo "production" || echo "staging")
          npx wrangler deploy --env $DEPLOY_ENV > ../user_deploy.txt 2>&1
          cat ../user_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.workers\.dev" ../user_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- SUMMARY REPORT ---
      - name: Deployment Summary
        if: always()
        run: |
          echo "### 🚀 Monorepo Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "| Project | Type | URL |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Adminside** | Pages | ${{ steps.deploy_adminside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Userside** | Worker | ${{ steps.deploy_userside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY