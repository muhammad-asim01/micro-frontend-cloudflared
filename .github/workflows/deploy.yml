name: Monorepo Deployment to Cloudflare

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3️⃣ Install jq for JSON parsing
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4️⃣ Ensure Cloudflare Pages projects exist
      - name: Ensure Pages projects exist
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for project in adminside-external userside-external; do
            EXIST=$(npx wrangler@latest pages project list --json | jq -r ".[] | select(.name==\"$project\") | .name")
            if [ -z "$EXIST" ]; then
              echo "Creating project $project..."
              npx wrangler@latest pages project create "$project"
              echo "Waiting 5s for project to register..."
              sleep 5
            else
              echo "Project $project already exists."
            fi
          done

      # --- PROJECT 1: adminside ---
      - name: Build & Deploy adminside
        id: deploy_adminside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing adminside..."
          cd adminside
          npm ci --legacy-peer-deps
          npm run build
          npx wrangler@latest pages deploy out --project-name=adminside-external --commit-dirty=true 2>&1 | tee ../admin_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.pages\.dev" ../admin_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- PROJECT 2: userside ---
      - name: Build & Deploy userside
        id: deploy_userside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing userside..."
          cd userside
          npm ci --legacy-peer-deps
          npm run build
          npx wrangler@latest pages deploy out --project-name=userside-external --commit-dirty=true 2>&1 | tee ../user_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.pages\.dev" ../user_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- SUMMARY REPORT ---
      - name: Deployment Summary
        if: always()
        run: |
          echo "### 🚀 Monorepo Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Project | Type | URL |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Adminside** | Pages | ${{ steps.deploy_adminside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Userside** | Pages | ${{ steps.deploy_userside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY