name: Monorepo Deployment to Cloudflare

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 3️⃣ Ensure Cloudflare Pages projects exist
      - name: Create Pages projects if not exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler@latest pages project create adminside-external 2>/dev/null || true
          npx wrangler@latest pages project create userside-external 2>/dev/null || true

      # --- PROJECT 1: adminside (Cloudflare Pages) ---
      - name: Build & Deploy adminside
        id: deploy_adminside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing adminside..."
          cd adminside
          npm ci --legacy-peer-deps
          npm run build
          npx wrangler@latest pages deploy out --project-name=adminside-external --commit-dirty=true 2>&1 | tee ../admin_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.pages\.dev" ../admin_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- PROJECT 2: userside (Cloudflare Pages) ---
      - name: Build & Deploy userside
        id: deploy_userside
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Processing userside..."
          cd userside
          npm ci --legacy-peer-deps
          npm run build
          npx wrangler@latest pages deploy out --project-name=userside-external --commit-dirty=true 2>&1 | tee ../user_deploy.txt
          URL=$(grep -oE "https://[^ ]+\.pages\.dev" ../user_deploy.txt | head -n 1)
          echo "url=$URL" >> $GITHUB_OUTPUT

      # --- SUMMARY REPORT ---
      - name: Deployment Summary
        if: always()
        run: |
          echo "### 🚀 Monorepo Deployment Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Project | Type | URL |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Adminside** | Pages | ${{ steps.deploy_adminside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Userside** | Pages | ${{ steps.deploy_userside.outputs.url || 'Build Failed' }} |" >> $GITHUB_STEP_SUMMARY